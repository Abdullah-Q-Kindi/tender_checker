<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oman Tender Board IT Training Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f8fa;
      color: #222;
    }
    header {
      background: #294A70;
      color: #fff;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    main {
      margin: 2rem auto;
      max-width: 900px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      padding: 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #e9eff7;
      font-weight: 600;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .no-data {
      text-align: center;
      color: #8a8e97;
      padding: 2rem;
      font-style: italic;
    }
    @media (max-width: 600px) {
      main {
        padding: 1rem;
      }
      table, thead, tbody, th, td, tr {
        display: block;
      }
      th {
        position: sticky;
        top: 0;
        background: #e9eff7;
      }
      td {
        border-bottom: 1px solid #eee;
      }
      td:before {
        content: attr(data-label);
        display: block;
        font-weight: bold;
        color: #294A70;
        margin-bottom: 0.25em;
      }
    }
  </style>
</head>
<body>
  <header>
    🖥️ Oman Tender Board - IT Training & Tech Tenders Dashboard
  </header>
  <main>
    <h2 style="margin-bottom: 0;">Monitored Tenders</h2>
    <p style="color:#666; margin:.25em 0 1.5em;">Automatically updates with IT training, software development, and technology bids.</p>
    <table id="tenders-table">
      <thead>
        <tr>
          <th>Tender Title</th>
          <th>Entity</th>
          <th>Bid Submission Date</th>
          <th>Closing Date</th>
        </tr>
      </thead>
      <tbody id="tenders-tbody">
        <tr>
          <td colspan="4" class="no-data">No tenders to display.</td>
        </tr>
      </tbody>
    </table>
  </main>
  <script>
    // Data fetching & filtering logic will go here in later steps
  </script>
</body>
</html>
