<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oman Tender Board IT Training Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f8fa;
      color: #222;
    }
    header {
      background: #294A70;
      color: #fff;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    main {
      margin: 2rem auto;
      max-width: 900px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      padding: 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }
    th {
      background: #e9eff7;
      font-weight: 600;
    }
    tr:last-child td {
      border-bottom: none;
    }
    .title-col {
      min-width: 250px;
      max-width: 480px;
      word-break: break-word;
    }
    .no-data, .loading-msg {
      text-align: center;
      color: #8a8e97;
      padding: 2rem;
      font-style: italic;
    }
    @media (max-width: 600px) {
      main {
        padding: 1rem;
      }
      table, thead, tbody, th, td, tr {
        display: block;
      }
      th {
        position: sticky;
        top: 0;
        background: #e9eff7;
      }
      td {
        border-bottom: 1px solid #eee;
      }
      td:before {
        content: attr(data-label);
        display: block;
        font-weight: bold;
        color: #294A70;
        margin-bottom: 0.25em;
      }
      .title-col {
        min-width: unset;
        max-width: unset;
      }
    }
  </style>
</head>
<body>
  <header>
    🖥️ Oman Tender Board - IT Training & Tech Tenders Dashboard
  </header>
  <main>
    <h2 style="margin-bottom: 0;">Monitored Tenders</h2>
    <p style="color:#666; margin:.25em 0 1.5em;">Automatically updates with IT training, software development, and technology bids.</p>
    <table id="tenders-table">
      <thead>
        <tr>
          <th class="title-col">Title</th>
          <th>Entity</th>
          <th>Category</th>
          <th>Tender Type</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="tenders-tbody">
        <tr>
          <td colspan="5" class="loading-msg">Loading...</td>
        </tr>
      </tbody>
    </table>
  </main>
  <script>
    const tbody = document.getElementById('tenders-tbody');
    // Regex to remove category brackets (e.g., "Info [A,B]") -> "Info"
    const categoryCleanupRegex = /\s*\[.*?\]/;

    // Split the date field on pipe or dash
    function formatDateField(dateField) {
      // Try standard Tender Board format: "Sales End: 2024-07-19 12:00 AM | Bid Closing: 2024-07-22 10:00 AM"
      let salesEnd = "", bidClose = "";
      // Primary try: extract fields using keywords
      let salesEndMatch = dateField.match(/Sales\s*End\s*:? ([^\|\-]+)/i);
      let bidCloseMatch = dateField.match(/Bid\s*Closing\s*:? ([^\|\-]+)/i);
      if (salesEndMatch) salesEnd = salesEndMatch[1].trim();
      if (bidCloseMatch) bidClose = bidCloseMatch[1].trim();
      // Fallback if | present or comma-dash delimited
      if (!salesEnd && !bidClose) {
        let split = dateField.split('|');
        if (split.length === 2) {
          salesEnd = split[0].trim();
          bidClose = split[1].trim();
        } else {
          split = dateField.split('-');
          if (split.length === 2) {
            salesEnd = split[0].trim();
            bidClose = split[1].trim();
          }
        }
      }
      // Format output
      let lines = [];
      if (salesEnd) lines.push("Sales End Date: " + salesEnd);
      if (bidClose) lines.push("Bid Closing Date: " + bidClose);
      if (lines.length === 0) lines.push(dateField);
      return lines.join('<br>');
    }

    fetch('tenders.json')
      .then(response => {
        if (!response.ok) throw new Error('Could not load tenders.json');
        return response.json();
      })
      .then((data) => {
        tbody.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="no-data">No matching tenders found.</td></tr>`;
          return;
        }
        data.forEach(tender => {
          const row = document.createElement('tr');
          // Remove brackets from category
          const cleanCategory = (tender.category || '').replace(categoryCleanupRegex, '');
          // Format the date field
          const formattedDate = formatDateField(tender.date || '');
          row.innerHTML = `
            <td class="title-col">${tender.title || ''}</td>
            <td>${tender.entity || ''}</td>
            <td>${cleanCategory}</td>
            <td>${tender.tender_type || ''}</td>
            <td>${formattedDate}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(() => {
        tbody.innerHTML = `<tr><td colspan="5" class="no-data">No matching tenders found.</td></tr>`;
      });
  </script>
</body>
</html>
