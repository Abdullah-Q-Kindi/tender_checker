<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Oman Tender Board IT Training Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f6f8fa;
      color: #222;
    }
    header {
      background: #294A70;
      color: #fff;
      padding: 1rem 2rem;
      text-align: center;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    main {
      margin: 2rem auto;
      max-width: 1200px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.09);
      padding: 2rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    th, td {
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #eee;
      vertical-align: top;
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    th {
      background: #e9eff7;
      font-weight: 600;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover {
      background: #f0f4fa;
    }
    .title-col {
      width: 35%;
    }
    .title-col a {
      font-weight: 600;
      font-size: 1.02em;
      color: #294A70;
      text-decoration: none;
    }
    .title-col a:hover {
      text-decoration: underline;
    }
    .date-col {
      width: 18%;
      font-size: 0.92em;
      line-height: 1.7;
    }
    .closing-soon {
      color: #c0392b;
      font-weight: bold;
    }
    .no-data, .loading-msg {
      text-align: center;
      color: #8a8e97;
      padding: 2rem;
      font-style: italic;
    }
    .count-label {
      color: #294A70;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    🖥️ Oman Tender Board - IT Training & Tech Tenders Dashboard
  </header>
  <main>
    <h2 style="margin-bottom: 0;">Monitored Tenders</h2>
    <p style="color:#666; margin:.25em 0 1.5em;">
      Showing active IT and technology training tenders from the Oman Tender Board.
      <span id="tender-count" class="count-label"></span>
    </p>
    <table id="tenders-table">
      <thead>
        <tr>
          <th class="title-col">Title</th>
          <th>Entity</th>
          <th>Tender Type</th>
          <th class="date-col">Dates</th>
        </tr>
      </thead>
      <tbody id="tenders-tbody">
        <tr>
          <td colspan="4" class="loading-msg">Loading...</td>
        </tr>
      </tbody>
    </table>
  </main>
  <script>
    const tbody = document.getElementById('tenders-tbody');
    const countLabel = document.getElementById('tender-count');

    function formatDate(dateStr) {
      let salesEnd = "";
      let bidClose = "";
      const salesMatch = dateStr.match(/Sales EndDate:([^-B]+)/);
      const bidMatch = dateStr.match(/Bid Closing Date:(.+)/);
      if (salesMatch) salesEnd = "📅 Sales End: " + salesMatch[1].trim();
      if (bidMatch) bidClose = "⏰ Bid Close: " + bidMatch[1].trim();
      return [salesEnd, bidClose].filter(Boolean).join("<br>");
    }

    function isClosingSoon(dateStr) {
      try {
        const bidMatch = dateStr.match(/Bid Closing Date:(.+)/);
        if (!bidMatch) return false;
        const parts = bidMatch[1].trim().split("-");
        const bidDate = new Date(parts[2], parts[1] - 1, parts[0]);
        const today = new Date();
        today.setHours(0,0,0,0);
        const diff = (bidDate - today) / (1000 * 60 * 60 * 24);
        return diff <= 7;
      } catch { return false; }
    }

    fetch('tenders.json')
      .then(r => {
        if (!r.ok) throw new Error('Failed');
        return r.json();
      })
      .then(data => {
        tbody.innerHTML = '';
        if (!Array.isArray(data) || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="no-data">No active tenders found.</td></tr>';
          return;
        }
        countLabel.textContent = '— ' + data.length + ' active tenders found';
        data.forEach(t => {
          const row = document.createElement('tr');
          const soon = isClosingSoon(t.date || '');
          const titleCell = t.link
            ? `<a href="${t.link}" target="_blank">${t.title || ''}</a>`
            : t.title || '';
          row.innerHTML = `
            <td class="title-col">${titleCell}</td>
            <td>${t.entity || ''}</td>
            <td>${t.tender_type || ''}</td>
            <td class="date-col ${soon ? 'closing-soon' : ''}">${formatDate(t.date || '')}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(() => {
        tbody.innerHTML = '<tr><td colspan="4" class="no-data">No active tenders found.</td></tr>';
      });
  </script>
</body>
</html>
